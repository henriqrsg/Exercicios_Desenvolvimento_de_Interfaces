<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard: Box Model Avançado</title>
    <link rel="stylesheet" href="css/avaliacao08.css">
</head>
<body>
    <div class="container-central">

        <h1 class="titulo">Console de Operações</h1>

        <div class="secao-kpis">
            <div class="quadro-kpi">
                <h3>Entrada</h3>
                <p class="valor">150 kw</p>
            </div>
            <div class="quadro-kpi">
                <h3>Saida</h3>
                <p class="valor">148 kw</p>
            </div>
        </div>

        <div class="alerta-card erro">
            <strong>CRÍTICO:</strong> Sobrecarga detectada no Motor A.
        </div>

        <div class="alerta-card aviso">
            <strong>OK:</strong> Sistemas de refrigeração estáveis
        </div>

        <footer class="rodape">
            <p class="linha"></p>
            <h3>Status do Servidor: <strong>Ativo</strong></h3>
            <p>Última Sincronização: 12:45:01</p>
        </footer>

    </div>

</body>
</html>
